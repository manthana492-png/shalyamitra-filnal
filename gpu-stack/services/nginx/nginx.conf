# ══════════════════════════════════════════════════════════
# ShalyaMitra — Nginx Reverse Proxy (Lightning AI GPU slot)
# ══════════════════════════════════════════════════════════
# Cloudflare handles TLS. Nginx only sees plain HTTP.
# Cloudflare → :80 (this file) → FastAPI :9000
#
# WebSocket paths:
#   /ws/realtime   — live agent event stream
#   /ws/rtc        — WebRTC signaling
# ══════════════════════════════════════════════════════════

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr [$time_local] "$request" $status '
                    '$body_bytes_sent "$http_referer" "$http_user_agent" '
                    'rt=$request_time';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 3600;          # keep-alive for 8-hr surgery sessions
    keepalive_requests 100000;
    client_max_body_size 50m;        # camera frame uploads

    # Cloudflare passes the real client IP in CF-Connecting-IP
    real_ip_header CF-Connecting-IP;

    # ── Upstream: FastAPI agent-orchestrator ────────────
    upstream agent {
        server agent-orchestrator:9000;
        keepalive 64;
    }

    # ── Main server block ───────────────────────────────
    server {
        listen 80;
        server_name _;

        # Health check for Cloudflare / slot-activation script
        location = /nginx-health {
            access_log off;
            return 200 "ok\n";
        }

        # ── WebSocket upgrade (realtime + RTC signaling) ──
        location ~ ^/ws/ {
            proxy_pass         http://agent;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Long timeouts — a surgery session can run for hours
            proxy_read_timeout    28800;  # 8 hours
            proxy_send_timeout    28800;
            proxy_connect_timeout 10;

            # No buffering on streaming connections
            proxy_buffering off;
        }

        # ── REST API + internal routes ────────────────────
        location /api/ {
            proxy_pass         http://agent;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120;
            proxy_send_timeout 120;
        }

        # ── Health + docs (FastAPI built-in) ─────────────
        location ~ ^/(healthz|docs|redoc|openapi.json) {
            proxy_pass         http://agent;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
        }

        # ── Default: block anything else ─────────────────
        location / {
            return 404;
        }
    }
}
