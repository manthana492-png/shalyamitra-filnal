# ══════════════════════════════════════════════════════════
# ShalyaMitra GPU Stack — Lightning AI H100 (per-slot)
# ══════════════════════════════════════════════════════════
# Production deployment model:
#   - Frontend  → Vercel      (always-on, free CDN)
#   - Auth/DB   → Supabase    (always-on)
#   - WebRTC    → LiveKit Cloud (always-on, pay-per-room-minute)
#   - GPU stack → Lightning AI H100 (this file, per-slot only)
#   - DNS proxy → Cloudflare  gpu.shalyamitra.quaasx108.com → this instance
#
# Slot activation:
#   1. Run scripts/slot-start.sh    (updates Cloudflare DNS + starts stack)
#   2. Run scripts/slot-stop.sh     (clears DNS + shuts down)
#
# Start (default — cloud NIM, LiveKit Cloud, no local NIM):
#   docker compose -f docker-compose.gpu.yml up -d --build
# With NVIDIA Riva + Holoscan:
#   COMPOSE_PROFILES=nvidia docker compose -f docker-compose.gpu.yml up -d
# With local offline NIM (no internet):
#   docker compose -f docker-compose.gpu.yml --profile local-nim up -d
# ══════════════════════════════════════════════════════════

services:
  # ═══════════════════════════════════════════════════════
  # 0. Nginx — Reverse Proxy (public entry-point)
  #    Cloudflare → :80 → nginx → FastAPI :9000
  #    Handles WebSocket upgrade + long-lived connections
  # ═══════════════════════════════════════════════════════
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./services/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - agent-orchestrator
    restart: unless-stopped

  # ═══════════════════════════════════════════════════════
  # 1. LiveKit (self-hosted — optional, local dev / offline)
  #    Production uses LiveKit Cloud (no container needed).
  #    Activate with: --profile livekit-local
  # ═══════════════════════════════════════════════════════
  livekit:
    profiles:
      - livekit-local
    image: livekit/livekit-server:v1.8
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882"
    environment:
      - LIVEKIT_KEYS=${LIVEKIT_API_KEY:-devkey}:${LIVEKIT_API_SECRET:-devsecret}
      - LIVEKIT_ENABLE_WEBSOCKET_RELAY=true
    volumes:
      - ./services/livekit/livekit.yaml:/livekit.yaml
    command: --config /livekit.yaml
    restart: unless-stopped

  # ═══════════════════════════════════════════════════════
  # 2. NVIDIA Riva — Speech AI (ASR + KWS + optional TTS)
  #    VRAM: ~4-5GB
  #    profile "nvidia" — the bare image often exits(0) until models exist; use
  #    NVIDIA Riva Quick Start (riva_init + riva_start) or NGC; see services/riva/README.md
  # ═══════════════════════════════════════════════════════
  riva:
    profiles:
      - nvidia
    image: nvcr.io/nvidia/riva/riva-speech:2.17.0
    ports:
      - "50051:50051"  # gRPC
      # Map Triton/HTTP when your Riva build exposes it (often 8000) so host can debug:
      # - "8000:8000"
    environment:
      - RIVA_ASR_ENABLE=true
      - RIVA_KWS_ENABLE=true
      - RIVA_TTS_ENABLE=true
      - RIVA_NMT_ENABLE=true
      - NGC_API_KEY=${NGC_API_KEY:-}
    # Helps some NVIDIA dev images that default to a shell when non-interactive
    tty: true
    stdin_open: true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - riva_models:/data/models
      - ./services/riva:/config
    restart: unless-stopped

  # ═══════════════════════════════════════════════════════
  # 3. NVIDIA NIM — Local LLM (Nemotron) — NOT used with cloud NIM API
  #    Enable only with: --profile local-nim
  #    Default stack uses NIM via NVIDIA_API_KEY (integrate.api.nvidia.com).
  # ═══════════════════════════════════════════════════════
  nim:
    profiles:
      - local-nim
    image: nvcr.io/nim/nvidia/nemotron-3-super-49b-v1:latest
    ports:
      - "8000:8000"
    environment:
      - NIM_CACHE_PATH=/opt/nim/.cache
      - NGC_API_KEY=${NGC_API_KEY:-}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - nim_cache:/opt/nim/.cache
    restart: unless-stopped

  # ═══════════════════════════════════════════════════════
  # 4. Fish Speech 1.5 — Conversational TTS
  #    Multi-voice: Nael, Pharmacist, Oracle, Monitor
  #    VRAM: ~3-4GB
  # ═══════════════════════════════════════════════════════
  # Stub uses CPU; replace image with real Fish Speech + GPU when enabling local TTS
  fish-speech:
    build: ./services/fish-speech
    ports:
      - "8080:8080"
    volumes:
      - fish_voices:/app/voices
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENROUTER_BASE_URL=${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      - ALLOW_AUDIO_PLACEHOLDER=${ALLOW_AUDIO_PLACEHOLDER:-false}
    restart: unless-stopped

  # ═══════════════════════════════════════════════════════
  # 5. Piper TTS — Critical Alert Path (~50ms)
  #    CPU-only, ultra-low latency
  # ═══════════════════════════════════════════════════════
  piper:
    build: ./services/piper
    ports:
      - "8090:8090"
    environment:
      - ALLOW_AUDIO_PLACEHOLDER=${ALLOW_AUDIO_PLACEHOLDER:-false}
    restart: unless-stopped

  # ═══════════════════════════════════════════════════════
  # 5b. Holoscan bridge — health + forward HoloHub events → agent
  #     (NVIDIA holoscan image has no ShalyaMitra /health; this service does)
  # ═══════════════════════════════════════════════════════
  holoscan-bridge:
    build: ./services/holoscan-bridge
    ports:
      - "9100:9100"
    environment:
      - VIDEO_INGEST_MODE=${VIDEO_INGEST_MODE:-webrtc}
      - AGENT_BASE_URL=http://agent-orchestrator:9000
      - INTERNAL_BUS_TOKEN=${INTERNAL_BUS_TOKEN:-}
    restart: unless-stopped

  # ═══════════════════════════════════════════════════════
  # 6b. NemoClaw MCP tool servers (Marma / Drug / Safety)
  #     HTTP /tools/call — wired via MARMA_MCP_URL etc. on agent-orchestrator
  # ═══════════════════════════════════════════════════════
  nemoclaw-marma:
    build:
      context: ..
      dockerfile: services/nemoclaw-mcp/Dockerfile
    command: ["python", "/w/nemoclaw/mcp_servers/marma_server.py"]
    environment:
      - MCP_PORT=3001
    ports:
      - "3001:3001"
    restart: unless-stopped

  nemoclaw-drug:
    build:
      context: ..
      dockerfile: services/nemoclaw-mcp/Dockerfile
    command: ["python", "/w/nemoclaw/mcp_servers/drug_server.py"]
    environment:
      - MCP_PORT=3002
    ports:
      - "3002:3002"
    restart: unless-stopped

  nemoclaw-safety:
    build:
      context: ..
      dockerfile: services/nemoclaw-mcp/Dockerfile
    command: ["python", "/w/nemoclaw/mcp_servers/safety_server.py"]
    environment:
      - MCP_PORT=3003
    ports:
      - "3003:3003"
    restart: unless-stopped

  # ═══════════════════════════════════════════════════════
  # 6. Holoscan Runtime — 3 Vision Pipelines
  #    Runs Monitor Sentinel, The Sentinel, Surgeon's Eye
  #    VRAM: ~12-15GB (shared across 3 graphs)
  #    profile "nvidia" + NVIDIA-recommended host flags (SHMEM, IPC) — see image banner
  #    HoloHub graphs: clone holohub, build ai_surgical_video, mount into ./services/holoscan
  # ═══════════════════════════════════════════════════════
  holoscan:
    profiles:
      - nvidia
    image: nvcr.io/nvidia/clara-holoscan/holoscan:v3.0.0-dgpu
    ipc: host
    cap_add:
      - SYS_PTRACE
    ulimits:
      memlock:
        soft: -1
        hard: -1
      stack: 67108864
    shm_size: 1g
    tty: true
    stdin_open: true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ./services/holoscan:/app/pipelines
      - holoscan_models:/app/models
    environment:
      # LiveKit Cloud (production) — wss://your-project.livekit.cloud
      - LIVEKIT_URL=${LIVEKIT_URL:-wss://your-project.livekit.cloud}
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY:-}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET:-}
      - AGENT_BUS_URL=http://agent-orchestrator:9000
    restart: unless-stopped

  # ═══════════════════════════════════════════════════════
  # 7. Agent Orchestrator — OpenClaw Multi-Agent Bus
  #    Runs all intelligence agents, routes events
  #    VRAM: ~0.5GB (thin coordinator)
  # ═══════════════════════════════════════════════════════
  agent-orchestrator:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "9000:9000"
    environment:
      - GPU_PROVIDER=local
      - RUNTIME_MODE=${RUNTIME_MODE:-production}
      - ENABLE_DEMO_MODE=${ENABLE_DEMO_MODE:-false}
      - DEV_AUTH_BYPASS=${DEV_AUTH_BYPASS:-false}
      - DEV_AUTH_BYPASS_SUB=${DEV_AUTH_BYPASS_SUB:-00000000-0000-0000-0000-000000000001}
      - DEV_AUTH_BYPASS_EMAIL=${DEV_AUTH_BYPASS_EMAIL:-owner@localhost}
      - DEV_AUTH_BYPASS_ROLE=${DEV_AUTH_BYPASS_ROLE:-admin}
      # Cloud NIM (default). For local NIM container, add profile local-nim and set
      # NVIDIA_NIM_BASE_URL=http://nim:8000/v1
      - NVIDIA_NIM_BASE_URL=${NVIDIA_NIM_BASE_URL:-https://integrate.api.nvidia.com/v1}
      - NVIDIA_API_KEY=${NVIDIA_API_KEY:-}
      - RIVA_GRPC_URL=riva:50051
      - FISH_SPEECH_URL=http://fish-speech:8080
      - PIPER_URL=http://piper:8090
      - QDRANT_URL=http://qdrant:6333
      - REDIS_URL=redis://redis:6379/0
      # LiveKit Cloud — same URL used by Holoscan + agent
      - LIVEKIT_URL=${LIVEKIT_URL:-wss://your-project.livekit.cloud}
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY:-}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - RIVA_HTTP_BASE=${RIVA_HTTP_BASE:-http://riva:8000}
      - HOLOSCAN_BASE_URL=${HOLOSCAN_BASE_URL:-http://holoscan-bridge:9100}
      - VIDEO_INGEST_MODE=${VIDEO_INGEST_MODE:-webrtc}
      - INTERNAL_BUS_TOKEN=${INTERNAL_BUS_TOKEN:-}
      - NEMOCLAW_CONFIG_DIR=/nemoclaw/config
      - MARMA_MCP_URL=http://nemoclaw-marma:3001
      - DRUG_MCP_URL=http://nemoclaw-drug:3002
      - SAFETY_MCP_URL=http://nemoclaw-safety:3003
      - NEMOCLAW_AUDIT_LOG_PATH=${NEMOCLAW_AUDIT_LOG_PATH:-}
    volumes:
      - ../nemoclaw:/nemoclaw/config:ro
    depends_on:
      - nemoclaw-marma
      - nemoclaw-drug
      - nemoclaw-safety
      - fish-speech
      - piper
      - holoscan-bridge
      - qdrant
      - redis
      # nginx depends on agent-orchestrator, so agent boots first
    command: >
      uvicorn app.main:app
      --host 0.0.0.0 --port 9000
    restart: unless-stopped

  # ═══════════════════════════════════════════════════════
  # 8. Qdrant — Vector Database (RAG)
  #    CPU-only, stores Shalyatantra + medical embeddings
  # ═══════════════════════════════════════════════════════
  qdrant:
    image: qdrant/qdrant:v1.13.2
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  # ═══════════════════════════════════════════════════════
  # 9. Redis — Session State + Event Pub/Sub
  # ═══════════════════════════════════════════════════════
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  riva_models:
  nim_cache:
  fish_voices:
  holoscan_models:
  qdrant_data:
  redis_data:
